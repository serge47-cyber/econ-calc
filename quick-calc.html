<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Експрес калькулятор окупності</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f5f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calc-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #1d1d1f; font-size: 24px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #86868b; }
        input { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #0071e3; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; background-color: #0071e3; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #0077ed; }
        #result { margin-top: 25px; padding: 15px; border-radius: 12px; background-color: #f5f5f7; text-align: center; font-weight: 600; color: #1d1d1f; min-height: 20px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #0071e3; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Точка беззбитковості</h2>
    <div class="input-group">
        <label>Постійні витрати (грн)</label>
        <input type="number" id="fc" placeholder="Наприклад: 50000">
    </div>
    <div class="input-group">
        <label>Ціна за одиницю (грн)</label>
        <input type="number" id="p" placeholder="Наприклад: 1200">
    </div>
    <div class="input-group">
        <label>Змінні витрати на од. (грн)</label>
        <input type="number" id="vc" placeholder="Наприклад: 800">
    </div>
    <button onclick="calculate()">Розрахувати результат</button>
    <div id="result">Введіть дані</div>
    
    <a href="index.html" class="back-link">← Повернутися на головну</a>
</div>

<script>
function calculate() {
    const fc = parseFloat(document.getElementById('fc').value);
    const p = parseFloat(document.getElementById('p').value);
    const vc = parseFloat(document.getElementById('vc').value);
    const resDiv = document.getElementById('result');

    if (p <= vc) {
        resDiv.style.color = "#ff3b30";
        resDiv.innerText = "Ціна має бути вища за витрати!";
        return;
    }

    if (fc && p && vc) {
        const result = Math.ceil(fc / (p - vc));
        resDiv.style.color = "#1d1d1f";
        resDiv.innerText = `Необхідно продати: ${result} шт.`;
    } else {
        resDiv.innerText = "Будь ласка, заповніть всі поля";
    }
}
</script>

</body>
</html>
